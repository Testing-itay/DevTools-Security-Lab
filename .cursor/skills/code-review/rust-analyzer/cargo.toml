[package]
name = "cursor-history-analyzer"
version = "0.1.0"
edition = "2021"
description = "Analyze Cursor IDE conversation history to extract development insights"

[dependencies]
rusqlite = { version = "0.31", features = ["bundled"] }
regex = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
clap = { version = "4", features = ["derive"] }
once_cell = "1"
dirs = "5"
